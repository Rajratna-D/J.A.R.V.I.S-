    calculator: calc.exe
    chrome: chrome.exe
    cmd: cmd.exe
    control panel: control.exe
    discord: Discord.exe
    edge: msedge.exe
    excel: EXCEL.EXE
    explorer: explorer.exe
    file explorer: explorer.exe
    firefox: firefox.exe
    google chrome: chrome.exe
    notepad: notepad.exe
    obs: obs64.exe
    outlook: OUTLOOK.EXE
    paint: mspaint.exe
    powerpoint: POWERPNT.EXE
    powershell: powershell.exe
